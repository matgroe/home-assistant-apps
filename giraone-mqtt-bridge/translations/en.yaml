configuration:
  g1server:
    name: GiraOneServer
    description: Hostname or IP address of the Gira One Server
    default: localhost
    required: true
  g1username:
    name: Username
    description: Username for authentication with the Gira One Server
    default: User
    required: true
  g1passwd:
    name: Password
    description: Password for authentication with the Gira One Server
    default:
    required: true
  loglevel:
    name: Log Level
    description: Logging level for the application
    default: info