name: GiraOne MQTT Bridge
version: 0.0.30-dev
slug: giraone_mqtt_bridge
description: Bridge betwween GiraOne Home Server and MQTT
url: https://github.com/home-assistant/apps-example/tree/main/example
arch:
  - amd64

services:
  - mqtt:need
stage: experimental

hassio_api: true
init: false

options:
  GIRA_SERVER:
  GIRA_USER:
  GIRA_PASSWORD:
  MQTT_USE_INTERNAL_BROKER: true
  MQTT_BROKER:
  MQTT_PORT:
  MQTT_USER:
  MQTT_PASSWORD:
  LOG_LEVEL: info

schema:
  GIRA_SERVER: str
  GIRA_USER: str
  GIRA_PASSWORD: password
  LOG_LEVEL: list(trace|debug|info|warning|error)
  MQTT_USE_INTERNAL_BROKER: bool
  MQTT_BROKER: str
  MQTT_PORT: int
  MQTT_USER: str
  MQTT_PASSWORD: password

image: matgroe/hassio-giraone-mqtt-bridge
